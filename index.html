<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app">
    <header>
        <h1>Team Dashboard</h1>
    </header>
    <main>
        <div class="kanban-board">
            <div class="kanban-column" v-for="column in columns" :key="column.id">
                <h2>{{ column.title }}</h2>
                <div class="kanban-tasks">
                    <div class="task" v-for="task in column.tasks" :key="task.id" draggable="true" @dragstart="onDragStart(task)" @drop="onDrop(task)">
                        <h3>{{ task.title }}</h3>
                        <p>{{ task.description }}</p>
                        <button @click="openTaskModal(task)">Edit</button>
                    </div>
                </div>
            </div>
        </div>
        <aside class="activity-log">
            <h2>Activity Log</h2>
            <ul>
                <li v-for="activity in activities" :key="activity.id">{{ activity.description }}</li>
            </ul>
        </aside>
    </main>
    <footer>
        <p>© 2026 Team Dashboard</p>
    </footer>
</div>
<script>
const { createClient } = supabase;
const supabaseUrl = 'https://emmjvepuzllxchgtkao.supabase.co';
const supabaseKey = 'YOUR_EXISTING_SUPABASE_KEY'; // This should be updated with the actual key
const supabase = createClient(supabaseUrl, supabaseKey);

new Vue({
    el: '#app',
    data() {
        return {
            columns: [],
            activities: []
        };
    },
    methods: {
        async fetchTasks() {
            const { data, error } = await supabase.from('tasks').select('*');
            this.columns = data;
        },
        onDragStart(task) {
            // Handle drag start
        },
        onDrop(task) {
            // Handle drop
        },
        openTaskModal(task) {
            // Open modal to edit task
        },
    },
    mounted() {
        this.fetchTasks();
    }
});
</script>
</body>
</html>
